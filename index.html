<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estelar Canvas</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f6f8fa; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #afb8c1; }
    
    html.dark .custom-scrollbar::-webkit-scrollbar-track { background: #0d1117; }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #484f58; }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-screen w-full flex flex-col font-sans transition-colors duration-300 bg-slate-50 text-slate-800 dark:bg-[#0d1117] dark:text-slate-300">
  
  <!-- Cabeçalho -->
  <header class="h-14 border-b flex items-center px-2 sm:px-4 transition-colors duration-300 bg-white border-slate-200 dark:bg-[#161b22] dark:border-slate-800 shrink-0 overflow-x-auto hide-scrollbar">
    
    <!-- Ações de Edição e Busca -->
    <div class="flex items-center gap-1">
      <button onclick="execCmd('undo')" class="p-2 rounded-md transition-colors text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Desfazer">
        <i data-lucide="undo-2" class="w-4 h-4"></i>
      </button>
      <button onclick="execCmd('redo')" class="p-2 rounded-md transition-colors text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Refazer">
        <i data-lucide="redo-2" class="w-4 h-4"></i>
      </button>
      <button onclick="formatCode()" class="p-2 rounded-md transition-colors text-indigo-600 hover:bg-slate-100 dark:text-indigo-400 dark:hover:bg-slate-700" title="Auto-Formatar Código">
        <i data-lucide="wand-2" class="w-4 h-4"></i>
      </button>

      <!-- Busca -->
      <div id="search-container" class="hidden items-center px-2 py-1 rounded-md border transition-all ml-1 w-28 sm:w-40 bg-slate-100 border-slate-300 dark:bg-slate-800 dark:border-slate-700">
        <i data-lucide="search" class="w-3 h-3 text-indigo-400 mr-2 shrink-0"></i>
        <input type="text" id="search-input" placeholder="Buscar..." class="bg-transparent border-none outline-none text-xs w-full text-slate-700 dark:text-slate-200">
        <button onclick="toggleSearch(false)" class="ml-1 shrink-0 text-slate-400 hover:text-red-400">
          <i data-lucide="x" class="w-3 h-3"></i>
        </button>
      </div>
      <button id="search-btn" onclick="toggleSearch(true)" class="p-2 rounded-md transition-colors ml-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Buscar">
        <i data-lucide="search" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Abas -->
    <div class="flex flex-1 justify-center min-w-[150px] mx-4">
      <div class="flex gap-1">
        <button id="tab-code" onclick="setTab('code')" class="flex items-center gap-1.5 px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all bg-indigo-50 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-400">
          <i data-lucide="code-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Código</span>
        </button>
        <button id="tab-preview" onclick="setTab('preview')" class="flex items-center gap-1.5 px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-100 dark:hover:text-slate-300 dark:hover:bg-slate-800/50">
          <i data-lucide="play" class="w-4 h-4"></i> <span class="hidden sm:inline">Prévia</span>
        </button>
      </div>
    </div>

    <!-- Ferramentas -->
    <div class="flex items-center justify-end gap-1 relative">
      <button onclick="changeZoom(-2)" class="p-2 rounded-md text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Reduzir Fonte">
        <i data-lucide="zoom-out" class="w-4 h-4"></i>
      </button>
      <button onclick="changeZoom(2)" class="p-2 rounded-md text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Aumentar Fonte">
        <i data-lucide="zoom-in" class="w-4 h-4"></i>
      </button>
      
      <div class="w-px h-6 bg-slate-200 dark:bg-slate-700/50 mx-1"></div>

      <!-- Menus (Snippets e Download) -->
      <button id="btn-snippets-menu" onclick="toggleMenu('snippets-menu')" class="p-2 rounded-md transition-colors text-yellow-600 hover:bg-slate-100 dark:text-yellow-400 dark:hover:bg-slate-700" title="Carregar Modelos">
        <i data-lucide="folder-open" class="w-4 h-4"></i>
      </button>
      <div id="snippets-menu" class="hidden fixed top-14 right-16 mt-1 w-48 rounded-md shadow-xl z-50 border overflow-hidden bg-white border-slate-200 dark:bg-[#161b22] dark:border-slate-700">
        <div class="px-4 py-2 text-xs font-bold uppercase tracking-wider border-b border-slate-200 text-slate-500 dark:border-slate-700 dark:text-slate-400">Modelos Base</div>
        <button onclick="loadSnippet('Template Padrão')" class="block w-full text-left px-4 py-2 text-sm transition-colors text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Template Padrão</button>
        <button onclick="loadSnippet('Botão de Dobra')" class="block w-full text-left px-4 py-2 text-sm transition-colors text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Botão de Dobra</button>
        <button onclick="loadSnippet('Card do Tripulante')" class="block w-full text-left px-4 py-2 text-sm transition-colors text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Card do Tripulante</button>
      </div>

      <button id="btn-download-menu" onclick="toggleMenu('download-menu')" class="p-2 rounded-md transition-colors text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Baixar Arquivo">
        <i data-lucide="download" class="w-4 h-4"></i>
      </button>
      <div id="download-menu" class="hidden fixed top-14 right-4 mt-1 w-32 rounded-md shadow-xl z-50 border overflow-hidden bg-white border-slate-200 dark:bg-[#161b22] dark:border-slate-700">
        <button onclick="downloadFile('html')" class="block w-full text-left px-4 py-2 text-sm transition-colors text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">.HTML</button>
        <button onclick="downloadFile('txt')" class="block w-full text-left px-4 py-2 text-sm transition-colors text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">.TXT</button>
      </div>

      <button onclick="copyCode()" class="p-2 rounded-md transition-colors text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700" title="Copiar Código">
        <i id="copy-icon" data-lucide="copy" class="w-4 h-4"></i>
      </button>
      <button onclick="clearCode()" class="p-2 rounded-md transition-colors text-red-600 hover:bg-red-100 dark:text-red-400 dark:hover:bg-red-900/40" title="Limpar tudo">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
      </button>
    </div>
  </header>

  <!-- Corpo Principal -->
  <div class="flex-1 flex flex-col overflow-hidden">
    
    <!-- Painel de Código -->
    <div id="panel-code" class="w-full h-full flex flex-col transition-colors duration-300 bg-[#f6f8fa] dark:bg-[#0d1117]">
      <div class="flex flex-1 overflow-hidden relative">
        <div id="line-numbers" class="flex flex-col text-right pr-3 pl-2 py-4 select-none overflow-hidden font-mono transition-colors duration-300 border-r min-w-[48px] bg-[#f6f8fa] text-[#6e7781] border-[#d0d7de] dark:bg-[#0d1117] dark:text-[#484f58] dark:border-[#30363d]"></div>
        
        <div class="relative flex-1 overflow-hidden bg-transparent">
          <!-- Coloração Sintática -->
          <pre id="code-highlight" class="absolute top-0 left-0 w-full h-full p-4 pl-3 font-mono whitespace-pre overflow-hidden pointer-events-none transition-colors duration-300 m-0 text-[#1F2328] dark:text-[#c9d1d9]" aria-hidden="true"></pre>
          
          <!-- Área de Digitação Transparente -->
          <textarea id="code-editor" class="absolute top-0 left-0 w-full h-full p-4 pl-3 font-mono custom-scrollbar whitespace-pre overflow-auto resize-none outline-none m-0 bg-transparent selection:bg-indigo-500/30" spellcheck="false" placeholder="Cole seu código HTML, CSS e JS aqui..." wrap="off" style="color: transparent;"></textarea>
        </div>
      </div>
    </div>

    <!-- Painel de Prévia -->
    <div id="panel-preview" class="hidden w-full h-full flex-col bg-slate-50 dark:bg-white">
      <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin" class="flex-1 w-full h-full border-none bg-white"></iframe>
    </div>
  </div>

  <script>
    // Configurações e Estado Inicial
    lucide.createIcons();
    
    const editor = document.getElementById('code-editor');
    const highlight = document.getElementById('code-highlight');
    const lineNumbers = document.getElementById('line-numbers');
    const preview = document.getElementById('preview-frame');
    const searchInput = document.getElementById('search-input');
    
    let debounceTimer;
    let fontSize = parseInt(localStorage.getItem('estelar-font')) || 14;
    let isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let searchCurrentIndex = 0;
    
    const htmlTemplate = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    body { font-family: 'Space Grotesk', sans-serif; }
    .stars {
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
    }
  </style>
</head>
<body class="bg-gray-950 text-white flex flex-col items-center justify-center min-h-screen m-0 stars">
  <div class="p-8 bg-gray-900/80 backdrop-blur-md rounded-2xl shadow-2xl text-center border border-indigo-500/30 max-w-sm w-full mx-4">
    
    <div class="w-16 h-16 bg-indigo-600 rounded-full mx-auto mb-4 flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.5)]">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    </div>
    
    <h1 class="text-2xl font-bold text-indigo-400 mb-2">Sistemas Online</h1>
    <p class="text-gray-400 text-sm mb-6">Saudações, Alferes. O console está pronto para seus comandos.</p>
    
    <button onclick="alert('Propulsores ativados! Rumo ao desconhecido.')" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition-all transform hover:scale-105 active:scale-95 shadow-lg">
      Iniciar Propulsores
    </button>
    
  </div>
</body>
</html>`;
    
    const snippets = {
      'Template Padrão': htmlTemplate,
      'Botão de Dobra': `<button class="animate-pulse bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(79,70,229,0.8)] transition-all">\n  ATIVAR DOBRA ESPACIAL\n</button>`,
      'Card do Tripulante': `<div class="w-72 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl">\n  <div class="h-24 bg-gradient-to-r from-indigo-500 to-purple-600"></div>\n  <div class="px-6 py-4 relative">\n    <div class="w-16 h-16 bg-slate-800 rounded-full border-4 border-slate-900 absolute -top-8 left-6 flex items-center justify-center">\n      <span class="text-2xl">👨‍🚀</span>\n    </div>\n    <h3 class="text-xl font-bold text-white mt-8">Alferes Prime</h3>\n    <p class="text-slate-400 text-sm mt-1">Explorador do Setor 7</p>\n  </div>\n</div>`
    };

    // Inicialização
    editor.value = localStorage.getItem('estelar-code') || '';
    updateSystem();
    applyZoom();
    checkTheme();

    // Sistema Principal de Atualização
    function updateSystem() {
      const code = editor.value;
      localStorage.setItem('estelar-code', code);
      
      // Update Line Numbers
      const lines = code.split('\n').length;
      let numbersHtml = '';
      for(let i=1; i<=Math.max(1, lines); i++) {
        numbersHtml += `<div style="height: ${fontSize * 1.5}px">${i}</div>`;
      }
      lineNumbers.innerHTML = numbersHtml;

      // Update Syntax Highlighting
      highlight.innerHTML = processHighlight(code, searchInput.value);

      // Debounce Preview Update
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        preview.srcdoc = code;
      }, 500);
    }

    // Processador de Cores (Highlighter)
    function processHighlight(text, search) {
      if (!text) return '';
      let processed = text;
      
      if (search) {
        const safe = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        processed = processed.replace(new RegExp(`(${safe})`, 'gi'), '\uE000$1\uE001');
      }

      processed = processed.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      const tagC = isDarkMode ? 'text-[#7ee787]' : 'text-[#116329]'; 
      const attrC = isDarkMode ? 'text-[#79c0ff]' : 'text-[#0550ae]'; 
      const strC = isDarkMode ? 'text-[#a5d6ff]' : 'text-[#0a3069]'; 
      const comC = isDarkMode ? 'text-[#8b949e]' : 'text-[#6e7781]'; 
      const brkC = isDarkMode ? 'text-slate-400' : 'text-slate-500'; 

      processed = processed.replace(/(&lt;!--[\s\S]*?--&gt;)/g, `<span class="${comC}">$1</span>`); 
      processed = processed.replace(/(&quot;.*?&quot;|&#39;.*?&#39;|"[^"]*"|'[^']*')/g, `<span class="${strC}">$1</span>`); 
      processed = processed.replace(/(&lt;\/?)([a-zA-Z0-9-]+)/g, `<span class="${brkC}">$1</span><span class="${tagC}">$2</span>`); 
      processed = processed.replace(/(&gt;)/g, `<span class="${brkC}">$1</span>`); 
      processed = processed.replace(/([a-zA-Z0-9-]+)(?=\s*=)/g, `<span class="${attrC}">$1</span>`); 

      if (search) {
        processed = processed.replace(/\uE000/g, `<mark class="${isDarkMode ? 'bg-amber-500/50 text-amber-100' : 'bg-amber-400/60 text-amber-900'} rounded-sm px-[1px] shadow-[0_0_8px_rgba(245,158,11,0.4)]">`).replace(/\uE001/g, '</mark>');
      }
      return processed;
    }

    // Listeners do Editor
    editor.addEventListener('input', updateSystem);
    editor.addEventListener('scroll', (e) => {
      lineNumbers.scrollTop = e.target.scrollTop;
      highlight.scrollTop = e.target.scrollTop;
      highlight.scrollLeft = e.target.scrollLeft;
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + "  " + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = start + 2;
        updateSystem();
      }
    });

    // Funções de Menu e Ferramentas
    function setTab(tab) {
      document.getElementById('panel-code').classList.toggle('hidden', tab !== 'code');
      document.getElementById('panel-preview').classList.toggle('hidden', tab !== 'preview');
      
      const isDark = document.documentElement.classList.contains('dark');
      const activeClasses = isDark ? 'bg-indigo-500/10 text-indigo-400' : 'bg-indigo-50 text-indigo-600';
      const inactiveClasses = isDark ? 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100';

      document.getElementById('tab-code').className = `flex items-center gap-1.5 px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all ${tab === 'code' ? activeClasses : inactiveClasses}`;
      document.getElementById('tab-preview').className = `flex items-center gap-1.5 px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all ${tab === 'preview' ? activeClasses : inactiveClasses}`;
    }

    function toggleMenu(id) {
      const menus = ['snippets-menu', 'download-menu'];
      menus.forEach(m => { if (m !== id) document.getElementById(m).classList.add('hidden'); });
      document.getElementById(id).classList.toggle('hidden');
    }

    document.addEventListener('mousedown', (e) => {
      if (!e.target.closest('#snippets-menu') && !e.target.closest('#btn-snippets-menu')) {
        document.getElementById('snippets-menu').classList.add('hidden');
      }
      if (!e.target.closest('#download-menu') && !e.target.closest('#btn-download-menu')) {
        document.getElementById('download-menu').classList.add('hidden');
      }
    });

    function execCmd(cmd) { editor.focus(); document.execCommand(cmd); }
    function clearCode() { editor.value = ''; updateSystem(); }
    function loadSnippet(name) { editor.value = snippets[name]; toggleMenu('snippets-menu'); updateSystem(); }
    
    function changeZoom(val) {
      fontSize = Math.max(10, Math.min(24, fontSize + val));
      localStorage.setItem('estelar-font', fontSize);
      applyZoom();
    }

    function applyZoom() {
      editor.style.fontSize = `${fontSize}px`;
      editor.style.lineHeight = `${fontSize * 1.5}px`;
      highlight.style.fontSize = `${fontSize}px`;
      highlight.style.lineHeight = `${fontSize * 1.5}px`;
      editor.style.caretColor = isDarkMode ? '#e6edf3' : '#1F2328';
      updateSystem();
    }

    // --- NOVO MOTOR DE EXTRAÇÃO DE ARQUIVOS ---
    function downloadFile(ext) {
      const a = document.createElement('a');
      // Usando uma "Data URI" que dribla bloqueios de Blob na memória
      a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(editor.value);
      a.download = `codigo-estelar.${ext}`;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toggleMenu('download-menu');
    }

    function copyCode() {
      navigator.clipboard.writeText(editor.value).catch(() => {
        const ta = document.createElement('textarea'); ta.value = editor.value; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      });
      const icon = document.getElementById('copy-icon');
      icon.setAttribute('data-lucide', 'check'); icon.classList.add('text-green-400'); lucide.createIcons();
      setTimeout(() => { icon.setAttribute('data-lucide', 'copy'); icon.classList.remove('text-green-400'); lucide.createIcons(); }, 2000);
    }

    // Busca e Auto Formatação
    function toggleSearch(show) {
      document.getElementById('search-container').classList.toggle('hidden', !show);
      document.getElementById('search-container').classList.toggle('flex', show);
      document.getElementById('search-btn').classList.toggle('hidden', show);
      if (show) { searchInput.focus(); searchCurrentIndex = -1; } 
      else { searchInput.value = ''; updateSystem(); }
    }

    searchInput.addEventListener('input', () => { searchCurrentIndex = -1; updateSystem(); });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const term = searchInput.value.toLowerCase();
        if (!term || !editor.value) return;
        const codeLow = editor.value.toLowerCase();
        let matches = [], i = 0;
        while ((i = codeLow.indexOf(term, i)) !== -1) { matches.push(i); i += term.length; }
        if (matches.length > 0) {
          searchCurrentIndex = (searchCurrentIndex + 1) % matches.length;
          editor.focus();
          editor.setSelectionRange(matches[searchCurrentIndex], matches[searchCurrentIndex] + term.length);
        }
      }
    });

    function formatCode() {
      let indent = 0;
      editor.value = editor.value.split('\n').map(line => {
        let t = line.trim();
        if (!t) return '';
        if (t.match(/^<\/[a-zA-Z0-9-]+>/)) indent = Math.max(0, indent - 1);
        let nL = '  '.repeat(indent) + t;
        if (t.match(/^<[a-zA-Z0-9-]+[^>]*>$/) && !t.match(/<\/[a-zA-Z0-9-]+>$/) && !t.match(/\/>$/) && !t.match(/^<(input|img|br|hr|meta|link)/)) indent++;
        return nL;
      }).filter(l => l.trim() !== '').join('\n');
      updateSystem();
    }

    // Tema dinâmico e Mensagens da Nave-Mãe
    function checkTheme() {
      if (isDarkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      applyZoom(); // Refresh highlight colors and caret
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      isDarkMode = e.matches; checkTheme();
    });

    window.addEventListener('message', (e) => {
      if (e.data && typeof e.data.theme === 'string') {
        isDarkMode = e.data.theme === 'dark'; checkTheme();
      }
    });

  </script>
</body>
</html>
